name: publish-package

on:
  workflow_dispatch:

jobs:
  publish:
    # Use macos-latest or windows-latest if you want to publish to those platforms
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install-ubuntu
        if: ${{ matrix.os != 'windows-latest' }}
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH
      - name: install-windows
        if: ${{ matrix.os == 'windows-latest' }}
        run: |
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser; irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
          "C:\Users\runneradmin\.moon\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: post install
        run: |
          moon version --all
          moon update

      # Add -C if your moon.mod.json or moon.pkg.json is not in the root directory
      - name: prepublish check
        run: |
          moon check --target all
          moon test --target all

      - name: publish
        env:
          SECRET: ${{ secrets.MOONCAKES_MOONBITLANG_TOKEN }}
        run: |
          echo "$SECRET" > ~/.moon/credentials.json
          moon publish
          rm ~/.moon/credentials.json
